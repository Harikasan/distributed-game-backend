name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-cpp-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [player-service, match-service]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libgrpc++-dev protobuf-compiler-grpc libprotobuf-dev protobuf-compiler \
            libpqxx-dev libpq-dev libhiredis-dev

      - name: Configure
        working-directory: ${{ matrix.service }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: ${{ matrix.service }}
        run: cmake --build build -j"$(nproc)"

  build-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: gateway-service
        run: npm install
      - name: Syntax check
        working-directory: gateway-service
        run: node --check src/server.js && node --check src/grpc_clients.js

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-cpp-services, build-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build player-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: player-service/Dockerfile
          push: false
          tags: player-service:ci

      - name: Build match-service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: match-service/Dockerfile
          push: false
          tags: match-service:ci

      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway-service/Dockerfile
          push: false
          tags: gateway-service:ci

  integration-test:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
        - uses: actions/checkout@v4
  
        - name: Start stack with docker compose
          run: docker compose up -d --build
  
        - name: Wait for gateway
          run: |
            for i in {1..30}; do
              if curl -sf http://localhost:8080/healthz > /dev/null; then
                echo "gateway is up"
                exit 0
              fi
              echo "waiting for gateway... ($i)"
              sleep 5
            done
            docker compose logs
            exit 1
  
        - name: Run smoke test
          run: |
            chmod +x scripts/smoke_test.sh
            BASE_URL=http://localhost:8080 ./scripts/smoke_test.sh
  
        - name: Dump logs on failure
          if: failure()
          run: docker compose logs
  
        - name: Tear down
          if: always()
          run: docker compose down -v
