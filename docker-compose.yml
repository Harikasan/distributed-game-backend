version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gamedb
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameuser -d gamedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  player-service:
    build:
      context: .
      dockerfile: player-service/Dockerfile
    environment:
      GRPC_PORT: "50051"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: gamedb
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_POOL_SIZE: "8"
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  match-service:
    build:
      context: .
      dockerfile: match-service/Dockerfile
    environment:
      GRPC_PORT: "50052"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: gamedb
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
      PLAYER_SERVICE_ADDR: "player-service:50051"
      DB_POOL_SIZE: "8"
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      player-service:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    environment:
      PORT: "8080"
      PLAYER_SERVICE_ADDR: "player-service:50051"
      MATCH_SERVICE_ADDR: "match-service:50052"
    ports:
      - "8080:8080"
    depends_on:
      - player-service
      - match-service

volumes:
  pgdata:
