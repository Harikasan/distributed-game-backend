apiVersion: apps/v1
kind: Deployment
metadata:
  name: player-service
  namespace: game-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: player-service
  template:
    metadata:
      labels:
        app: player-service
    spec:
      containers:
        - name: player-service
          image: ghcr.io/YOUR_GITHUB_USERNAME/player-service:latest
          ports:
            - containerPort: 50051
          envFrom:
            - configMapRef:
                name: game-backend-config
            - secretRef:
                name: game-backend-secrets
          env:
            - name: GRPC_PORT
              value: "50051"
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: player-service
  namespace: game-backend
spec:
  selector:
    app: player-service
  ports:
    - port: 50051
      targetPort: 50051
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: player-service-hpa
  namespace: game-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: player-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
